version: "3.9"

services:
  # --- Python ML Service ---
  ml:
    build: ./services/ml
    ports:
      - "8001:8001"
    environment:
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- GraphQL API ---
  api:
    build: ./services/api
    ports:
      - "4000:4000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-}
      - ML_API_BASE_URL=http://ml:8001
      - PORT=4000
    depends_on:
      ml:
        condition: service_healthy
    restart: unless-stopped

  # --- Next.js Web App ---
  web:
    build:
      context: ./apps/web
      # No NEXT_PUBLIC_GRAPHQL_URL build arg — app uses /api/graphql rewrite
    ports:
      - "3000:3000"
    environment:
      - GRAPHQL_BACKEND_URL=http://api:4000
    depends_on:
      - api
    restart: unless-stopped
