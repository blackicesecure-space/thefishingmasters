scalar JSON

type Spot {
  id: ID!
  name: String!
  latitude: Float!
  longitude: Float!
  bundesland: String!
  gewaesserTyp: String!
  fishSpecies: [String!]!
  avgCrowdLevel: Int!
  flaecheHa: Float
  maxTiefeM: Float
  parkplatz: Boolean!
  beschreibung: String
}

type ScoreBreakdown {
  bite: Float!
  quality: Float!
  convenience: Float!
  crowd: Float!
  personal: Float!
  total: Float!
  reasons: [String!]!
}

type LureRecommendation {
  lures: [String!]!
  tactics: [String!]!
}

type WeatherInfo {
  tempCelsius: Float!
  windSpeedKmh: Float!
  windDirection: Int!
  pressureHpa: Float!
  cloudCover: Int!
  humidity: Int!
  precipitationMm: Float!
  description: String!
  icon: String!
}

type LunarInfo {
  date: String!
  moonPhasePct: Float!
  moonPhaseName: String!
  moonIllumination: Float!
  solunarMajor1: String!
  solunarMajor2: String!
  solunarMinor1: String!
  solunarMinor2: String!
  solunarRating: Int!
}

type Recommendation {
  spot: Spot!
  score: Float!
  reason: String!
  bestWindow: String!
  breakdown: ScoreBreakdown!
  lure: LureRecommendation!
}

type Health {
  status: String!
}

type FeedbackEntry {
  id: ID!
  spotId: ID!
  success: Boolean!
  note: String
  createdAt: String!
}

type DashboardStats {
  totalSessions: Int!
  successCount: Int!
  failCount: Int!
  hitRate: Float!
  recentFeedback: [FeedbackEntry!]!
}

input RecommendationInput {
  targetSpecies: String!
  waterTempC: Float!
  windKmh: Float!
  pressureHpa: Float!
  moonPhase: Float!
  season: String!
  bundesland: String
}

input FeedbackInput {
  spotId: ID!
  success: Boolean!
  note: String
  targetSpecies: String
  crowdLevel: Int
}

type Query {
  health: Health!
  spots(bundesland: String, fishSpecies: String): [Spot!]!
  spot(id: ID!): Spot
  recommendations(input: RecommendationInput!): [Recommendation!]!
  weather(lat: Float!, lon: Float!): WeatherInfo!
  lunar(date: String, lat: Float, lon: Float): LunarInfo!
  dashboard: DashboardStats!
}

type Mutation {
  submitFeedback(input: FeedbackInput!): Boolean!
}
